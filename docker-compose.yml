version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civicfix-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: civicfix
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - civicfix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5001/api
        REACT_APP_SOCKET_URL: http://localhost:5001
    container_name: civicfix-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - civicfix-network

  db:
    image: mysql:8.0
    container_name: civicfix-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: civicfix
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - civicfix-network

networks:
  civicfix-network:
    driver: bridge

volumes:
  mysql-data: